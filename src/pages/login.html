<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    child-src 'none';
    object-src 'none';
  ">
  <title>Siri Tax</title>
  <link rel="stylesheet" href="../styles/login.css" />
</head>
<body>
  <div class="login-container">
    <h2>Siri Tax 로그인</h2>
    <label for="id">아이디</label>
    <div class="input-wrapper">
      <input type="text" id="id" placeholder="아이디를 입력하세요"/>
      <p class="clear-btn" id="clearId">&times;</button>
    </div>
    <label for="pw">비밀번호</label>
    <div class="input-wrapper">
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요"/>
      <p class="clear-btn" id="clearPw">&times;</button>
    </div>
    <span id="loginMessage" style="color: red; font-size: 13px;"></span>
    <button id="loginBtn" class="login-button">로그인</button>
    <button id="signupBtn" class="signup-button">회원가입</button>
  </div>
  <div id="loadingOverlay" style="display: none;">
    <div class="spinner">로그인 중입니다...</div>
  </div>
  <script src="../renderer/loginRenderer.js"></script>
</body>
</html>
