<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data:;
  child-src 'none';
  object-src 'none';
  ">
  <title>부가세과세표준증명</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      /* flex 정렬 삭제: 중앙 정렬을 제거하고 자연스러운 흐름으로 */
    }
    /* 뒤로가기 버튼: 화면 전체 기준 고정 */
    #backButton {
      position: fixed;
      top: 1px;
      left: -200px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 10000;
    }
    #backButton img {
      width: 24px;
      height: 24px;
    }
    /* 본문 컨테이너: 중앙에 위치하도록 margin을 사용 */
    .container {
      width: 340px;
      margin: 0 auto 0 auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    h3 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 15px;
    }
    label {
      width: 100%;
      margin-top: 10px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-top: 5px;
    }
    .biz-number {
      display: flex;
      gap: 5px;
      width: 100%;
    }
    .biz-number input {
      text-align: center;
      padding: 6px;
    }
    #biz1 { width: 35%; }
    #biz2 { width: 25%; }
    #biz3 { width: 50%; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      margin-bottom: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>부가세과세표준증명 신청</h3>

    <label for="bizNum">사업자등록번호</label>
    <input type="text" id="bizNum" inputmode="numeric" placeholder="예: 1234567890" />

    <label for="year">년도</label>
    <select id="year"></select>

    <label for="quarter">분기</label>
    <select id="quarter">
      <option value="1Q">1Q</option>
      <option value="2Q">2Q</option>
      <option value="3Q">3Q</option>
      <option value="4Q">4Q</option>
    </select>

    <label for="usage">사용 용도</label>
    <input type="text" id="usage"/>

    <label for="email">이메일 (선택)</label>
    <input type="email" id="email" placeholder="example@email.com" />

    <button id="vatStandardSubmitBtn">신청</button>
  </div>

  <script src="../../../renderer/certificate/vatStandardRenderer.js"></script>
</body>
</html>
