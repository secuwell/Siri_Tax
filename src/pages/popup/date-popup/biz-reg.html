<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data:;
  child-src 'none';
  object-src 'none';
  ">
  <title>사업자등록증명</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }
    #backButton {
      position: fixed;
      top: 1px;
      left: -200px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 10000;
    }
    #backButton img {
      width: 24px;
      height: 24px;
    }
    .container {
      width: 340px;
      margin: 0 auto 0 auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    h3 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 15px;
    }
    label {
      width: 100%;
      margin-top: 10px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-top: 5px;
    }
    .biz-number {
      display: flex;
      gap: 5px;
      width: 100%;
    }
    .biz-number input {
      text-align: center;
      padding: 6px;
    }
    #biz1 { width: 35%; }
    #biz2 { width: 25%; }
    #biz3 { width: 50%; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      margin-bottom: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 중앙에 위치하는 컨테이너 -->
  <div class="container">
    <h3>사업자등록증명 신청</h3>

    <label for="bizNum">사업자등록번호</label>
    <input type="text" id="bizNum" inputmode="numeric" placeholder="예: 1234567890" />
    
    <label for="bizDate">날짜</label>
    <input type="date" id="bizDate" />

    <label for="usage">사용 용도</label>
    <input type="text" id="usage"/>

    <label for="email">이메일 (선택)</label>
    <input type="email" id="email" placeholder="example@email.com" />

    <button id="bizSubmitBtn">신청</button>
  </div>
<script src="../../../renderer/certificate/bizRegRenderer.js"></script>
</body>
</html>
